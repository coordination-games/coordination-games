name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

defaults:
  run:
    working-directory: packages/cli

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'


      - name: Install dependencies
        run: npm install --include=dev
        working-directory: .

      - name: Build engine
        run: npx tsc --skipLibCheck
        working-directory: packages/engine

      - name: Build chat plugin
        run: npx tsc --skipLibCheck
        working-directory: packages/plugins/basic-chat

      - name: Build game plugin
        run: npx tsc --skipLibCheck
        working-directory: packages/games/capture-the-lobster

      - name: Build oathbreaker plugin
        run: npx tsc --skipLibCheck
        working-directory: packages/games/oathbreaker

      - name: Build tragedy plugin
        run: npx tsc --skipLibCheck
        working-directory: packages/games/tragedy-of-the-commons

      - name: Build CLI
        run: npm run build

      - name: Publish
        run: npx npm@latest publish --provenance --access public
