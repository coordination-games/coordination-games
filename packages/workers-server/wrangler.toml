name = "ctl-server"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
alias = { "@coordination-games/engine" = "../engine/src/index.ts", "@coordination-games/game-ctl" = "../games/capture-the-lobster/src/index.ts", "@coordination-games/game-oathbreaker" = "../games/oathbreaker/src/index.ts", "@coordination-games/plugin-chat" = "../plugins/basic-chat/src/index.ts" }

[[d1_databases]]
binding = "DB"
database_name = "ctl-db"
database_id = "a16be595-731c-4b55-8c4a-d937c142c2da"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_classes = ["GameRoomDO", "LobbyDO"]

# On-chain mode secrets (set via `wrangler secret put`):
# RPC_URL             — OP Sepolia RPC endpoint
# RELAYER_PRIVATE_KEY — Relayer wallet private key (gas payer)
# REGISTRY_ADDRESS    — CoordinationRegistry contract
# ERC8004_ADDRESS     — ERC-8004 agent identity NFT
# CREDITS_ADDRESS     — CoordinationCredits contract
# GAME_ANCHOR_ADDRESS — GameAnchor settlement contract
# USDC_ADDRESS        — MockUSDC (testnet) or USDC contract

[vars]
ENVIRONMENT = "production"

[[routes]]
pattern = "api.capturethelobster.com/*"
zone_name = "capturethelobster.com"

[[worker_domains]]
hostname = "api.capturethelobster.com"
zone_name = "capturethelobster.com"
