name = "ctl-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# NOTE: there is deliberately NO [build] command here. Wrangler runs the custom
# build on EVERY dev reload, and that build writes into sibling `dist/` dirs that
# live in the worker's module graph — so wrangler's own watcher saw the writes as
# "files changed", reloaded, and rebuilt again: an 8-package tsc fan-out per pass
# with no backoff (it once piled up ~700 procs / 26 GB before being caught).
#
# The worker-side dep build still matters — stale dists have shipped wrong money
# field names + wrong types to prod twice. So it now lives in the `build:deps` npm
# script, which both `dev` and `deploy` run ONCE up front (see package.json). That
# keeps the stale-dist guard for deploys without the dev-reload feedback loop. Web
# is deployed separately via Pages (flaky npm-workspace install) and stays out of
# build:deps to keep server deploy resilient.

[[d1_databases]]
binding = "DB"
database_name = "ctl-db"
database_id = "a16be595-731c-4b55-8c4a-d937c142c2da"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_classes = ["GameRoomDO", "LobbyDO"]

# On-chain mode secrets (set via `wrangler secret put`):
# RPC_URLS            — Comma-separated list of OP Sepolia RPC endpoints (preferred).
#                        Auth path tries them in order with exponential backoff and
#                        caches the first successful URL per request. Single-URL
#                        config behaves identically to legacy RPC_URL.
# RPC_URL             — Legacy single OP Sepolia RPC endpoint (used when RPC_URLS unset).
# RELAYER_PRIVATE_KEY — Relayer wallet private key (gas payer)
# REGISTRY_ADDRESS    — CoordinationRegistry contract
# ERC8004_ADDRESS     — ERC-8004 agent identity NFT
# CREDITS_ADDRESS     — CoordinationCredits contract
# GAME_ANCHOR_ADDRESS — GameAnchor settlement contract
# USDC_ADDRESS        — MockUSDC (testnet) or USDC contract

[vars]
ENVIRONMENT = "production"

[[routes]]
pattern = "api.games.coop"
custom_domain = true
