name = "ctl-server"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Rebuild worker-side workspace deps before bundling. The worker imports from
# `@coordination-games/{engine, plugin-chat, game-*}` which resolve to sibling
# packages' `dist/`; stale dists have shipped wrong money field names + wrong
# types to prod twice. Web is deployed separately via Pages and has a
# flaky npm-workspace install — excluded to keep server deploy resilient.
[build]
command = "cd ../.. && npm run build -w packages/engine && npm run build -w packages/plugins/basic-chat && npm run build -w packages/games/capture-the-lobster -w packages/games/oathbreaker"

[[d1_databases]]
binding = "DB"
database_name = "ctl-db"
database_id = "a16be595-731c-4b55-8c4a-d937c142c2da"

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoomDO"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "LobbyDO"

[[migrations]]
tag = "v1"
new_classes = ["GameRoomDO", "LobbyDO"]

# On-chain mode secrets (set via `wrangler secret put`):
# RPC_URLS            — Comma-separated list of OP Sepolia RPC endpoints (preferred).
#                        Auth path tries them in order with exponential backoff and
#                        caches the first successful URL per request. Single-URL
#                        config behaves identically to legacy RPC_URL.
# RPC_URL             — Legacy single OP Sepolia RPC endpoint (used when RPC_URLS unset).
# RELAYER_PRIVATE_KEY — Relayer wallet private key (gas payer)
# REGISTRY_ADDRESS    — CoordinationRegistry contract
# ERC8004_ADDRESS     — ERC-8004 agent identity NFT
# CREDITS_ADDRESS     — CoordinationCredits contract
# GAME_ANCHOR_ADDRESS — GameAnchor settlement contract
# USDC_ADDRESS        — MockUSDC (testnet) or USDC contract

[vars]
ENVIRONMENT = "production"

[[routes]]
pattern = "api.games.coop/*"
zone_name = "games.coop"

[[worker_domains]]
hostname = "api.games.coop"
zone_name = "games.coop"
